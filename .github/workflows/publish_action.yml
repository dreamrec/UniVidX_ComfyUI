name: Publish to Comfy registry

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "pyproject.toml"

jobs:
  publish-node:
    name: Publish Custom Node to registry
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Publish Custom Node
        uses: Comfy-Org/publish-node-action@main
        with:
          # Secret name matches dreamrec's other ComfyUI repos
          # (MatAnyone2_ComfyUI etc.) so a single registry token can be
          # rotated across all of them without renaming per-repo.
          personal_access_token: ${{ secrets.COMFYUI }}
