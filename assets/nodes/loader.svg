    <rect x="80" y="0" width="170" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
    <text x="88" y="13" class="v">intrinsic</text>
    <polygon points="240,7 246,7 243,12" fill="#9ca3af"/>
  </g>

  <g transform="translate(0,68)">
    <text x="14" y="11" class="t" fill="#9ca3af">dtype</text>
    <rect x="80" y="0" width="170" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
    <text x="88" y="13" class="v">bfloat16</text>
