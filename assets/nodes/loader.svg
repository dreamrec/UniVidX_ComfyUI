  </g>

  <g transform="translate(0,108)">
    <text x="318" y="5" text-anchor="end" class="lbl" fill="#c4b5fd">model</text>
    <circle cx="332" cy="0" r="5" fill="#a855f7" stroke="#1c1b27" stroke-width="1.5"/>
