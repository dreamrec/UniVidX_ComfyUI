<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 540" role="img" aria-label="UniVidX Sampler node">
  <defs>
    <linearGradient id="title3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#262534"/><stop offset="100%" stop-color="#1c1b27"/>
    </linearGradient>
    <linearGradient id="widget" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b3a4d"/><stop offset="100%" stop-color="#2e2d3e"/>
    </linearGradient>
    <linearGradient id="multi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f1e2c"/><stop offset="100%" stop-color="#16151f"/>
    </linearGradient>
    <style>.t{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;fill:#e8e8f0}
      .lbl{font-family:-apple-system,'Segoe UI',sans-serif;font-size:12px;font-weight:600;fill:#fff}
      .v{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11px;fill:#a7f3d0}
      .ttl{font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;font-weight:700;fill:#fff;letter-spacing:0.3px}
      .opt{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10px;fill:#6b7280}</style>
  </defs>
  <rect x="2" y="2" width="376" height="536" rx="8" fill="url(#body)" stroke="#444357" stroke-width="1.5"/>
  <rect x="2" y="2" width="376" height="28" rx="8" fill="url(#title3)"/>
  <rect x="2" y="22" width="376" height="8" fill="url(#title3)"/>
  <text x="14" y="21" class="ttl">UniVidX Sampler</text>
  <text x="362" y="21" text-anchor="end" class="t" fill="#fed7aa">UNIVIDX</text>

  <!-- Required inputs (typed connectors) -->
  <g font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600">
    <circle cx="8" cy="46" r="5" fill="#a855f7" stroke="#1c1b27" stroke-width="1.5"/>
    <text x="20" y="50" fill="#c4b5fd">model</text>
    <circle cx="8" cy="68" r="5" fill="#14b8a6" stroke="#1c1b27" stroke-width="1.5"/>
    <text x="20" y="72" fill="#5eead4">task</text>
  </g>

  <!-- Optional IMAGE inputs (modalities) -->
  <g>
    <text x="20" y="92" class="opt">— optional IMAGE inputs —</text>
    <g font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" font-weight="500">
      <circle cx="8" cy="106" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="110" fill="#86efac">rgb</text>
      <circle cx="8" cy="124" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="128" fill="#86efac">albedo</text>
      <circle cx="8" cy="142" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="146" fill="#86efac">irradiance</text>
      <circle cx="8" cy="160" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="164" fill="#86efac">normal</text>
      <circle cx="8" cy="178" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="182" fill="#86efac">pha</text>
      <circle cx="8" cy="196" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="200" fill="#86efac">fgr</text>
      <circle cx="8" cy="214" r="4.5" fill="#56dd56" stroke="#1c1b27" stroke-width="1.5" opacity="0.85"/>
      <text x="18" y="218" fill="#86efac">bgr</text>
    </g>
  </g>

  <!-- Widgets -->
  <g transform="translate(110,98)">
    <text x="0" y="11" class="t" fill="#9ca3af">prompt</text>
    <rect x="0" y="16" width="250" height="46" rx="3" fill="url(#multi)" stroke="#52516a" stroke-width="0.7"/>
    <text x="6" y="32" class="v" fill="#cbd5e1">a parrot flapping its wings</text>
    <text x="6" y="46" class="v" fill="#cbd5e1">on a tropical branch...</text>
    <text x="6" y="58" class="opt" fill="#6b7280">[multiline STRING]</text>
  </g>

  <g transform="translate(110,170)">
    <text x="0" y="11" class="t" fill="#9ca3af">negative_prompt</text>
    <rect x="0" y="16" width="250" height="32" rx="3" fill="url(#multi)" stroke="#52516a" stroke-width="0.7"/>
    <text x="6" y="32" class="v" fill="#cbd5e1">色调艳丽,过曝,静态...</text>
    <text x="6" y="44" class="opt" fill="#6b7280">[default Chinese neg-prompt]</text>
  </g>

  <g font-family="ui-monospace,Menlo,Consolas,monospace" font-size="11">
    <g transform="translate(110,232)">
      <text x="0" y="11" fill="#9ca3af">num_inference_steps</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">50</text>
    </g>
    <g transform="translate(110,256)">
      <text x="0" y="11" fill="#9ca3af">cfg_scale</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">5.00</text>
    </g>
    <g transform="translate(110,280)">
      <text x="0" y="11" fill="#9ca3af">denoising_strength</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">1.00</text>
    </g>
    <g transform="translate(110,304)">
      <text x="0" y="11" fill="#9ca3af">num_frames</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">21</text>
    </g>
    <g transform="translate(110,328)">
      <text x="0" y="11" fill="#9ca3af">height</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">480</text>
    </g>
    <g transform="translate(110,352)">
      <text x="0" y="11" fill="#9ca3af">width</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">640</text>
    </g>
    <g transform="translate(110,376)">
      <text x="0" y="11" fill="#9ca3af">seed</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#fde68a">1</text>
    </g>
    <g transform="translate(110,400)">
      <text x="0" y="11" fill="#9ca3af">tiled</text>
      <rect x="160" y="0" width="90" height="18" rx="3" fill="url(#widget)" stroke="#52516a" stroke-width="0.7"/>
      <text x="200" y="13" text-anchor="middle" fill="#86efac">☑ True</text>
    </g>
  </g>

  <!-- Output -->
  <g transform="translate(0,506)">
    <text x="358" y="5" text-anchor="end" class="lbl" fill="#fbcfe8">result</text>
    <circle cx="372" cy="0" r="5" fill="#ec4899" stroke="#1c1b27" stroke-width="1.5"/>
  </g>
</svg>
